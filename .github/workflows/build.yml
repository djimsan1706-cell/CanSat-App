name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: flet-dev/build-flet-app-action@v1
        with:
          target: apk
      - uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: output/apk/app-release.apk