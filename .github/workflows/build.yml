name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar el código
        uses: actions/checkout@v4

      - name: 2. Forzar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. Firmar licencias de Android (Bypass)
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: 4. Dependencias de sistema
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: 5. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 6. Instalar Flet y librerias
        run: pip install flet requests

      - name: 7. Compilar la APK
        run: flet build apk

      - name: 8. Guardar el instalador final
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: build/apk/